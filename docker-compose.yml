services:
  # Backend Flask com p4c
  backend:
    build: ./backend  # <-- Diz ao compose para construir o Dockerfile em ./backend
    platform: linux/amd64
    container_name: p4symtest-backend
    working_dir: /app
    # O 'command' agora está dentro do Dockerfile (CMD)
    ports:
      - "${BACKEND_HOST_PORT:-0}:5000"
    volumes:
      - ./backend:/app  # <-- Ainda montamos para live-reload do código
      - ./backend/workspace:/app/workspace
    # As ENVs agora vêm do Dockerfile, mas podem ser deixadas aqui também
    networks:
      - p4symtest-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend React
  frontend:
    image: node:22-alpine
    container_name: p4symtest-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "${FRONTEND_HOST_PORT:-5173-5273}:5173"
    volumes:
      - ./frontendV2:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=/api
      - VITE_API_MODE=real
      - VITE_PROXY_TARGET=http://backend:5000
    networks:
      - p4symtest-network
    depends_on:
      backend:
        condition: service_healthy
    stdin_open: true
    tty: true

networks:
  p4symtest-network:
    driver: bridge

volumes:
  node_modules:
